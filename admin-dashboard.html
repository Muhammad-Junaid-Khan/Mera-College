<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">

      <div class="collapse navbar-collapse" id="navbarNav">

        </ul>
      </div>
    </div>
  </nav>


  <!-- Sidebar Start -->

    <div class="sidebar-header p-3">

      <button class="btn btn-sm btn-light d-lg-none" onclick="toggleSidebar()">☰</button>
    </div>
    <ul class="nav flex-column p-2">
      <li class="nav-item"><a class="nav-link text-white" href="admin-dashboard.html">Dashboard</a></li>
      <li class="nav-item"><a class="nav-link text-white" href="student-panel.html">Students</a></li>
      <li class="nav-item"><a class="nav-link text-white" href="teacher-panel.html">Teachers</a></li>
      <li class="nav-item"><a class="nav-link text-white" href="#">Fee Management</a></li>
      <li class="nav-item"><a class="nav-link text-white" href="./admin-admition.html">Admissions</a></li>

      <button class="btn btn-dark d-lg-none" onclick="toggleSidebar()">☰</button>
      <span class="ms-2">Admin Dashboard</span>
    </nav>

    <div class="container-fluid mt-4">
      <!-- Charts -->
      <div class="row mb-4">
        <div class="col-md-6">
          <canvas id="studentsChart"></canvas>
        </div>
        <div class="col-md-6">
          <canvas id="feesChart"></canvas>
        </div>
      </div>

      <!-- Student Management -->
      <div class="card mb-4">
        <div class="card-header d-flex justify-content-between">
          <h5>Student List</h5>
          <button class="btn btn-success">Add Student</button>
        </div>
        <div class="card-body">
          <table class="table table-striped">
            <thead>
              <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Class</th>
                <th>Fee Status</th>
                <th>Action</th>
              </tr>
            </thead>
            <tbody>
              <tr>
                <td>1</td>
                <td>Ali Khan</td>
                <td>10</td>
                <td>Paid</td>
                <td><button class="btn btn-primary btn-sm">Edit</button></td>
              </tr>
              <tr>
                <td>2</td>
                <td>Maryam</td>
                <td>9</td>
                <td>Pending</td>
                <td><button class="btn btn-primary btn-sm">Edit</button></td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
